# ─────────────────────────────────────────────────────────────────────────────
# Devert Monitor Agent — Production Docker Compose
#
# File ini SATU-SATUNYA yang dibutuhkan di server (selain .env).
# Image diambil langsung dari GitHub Container Registry (GHCR).
#
# Setup awal di server:
#   mkdir -p /opt/devert && cd /opt/devert
#   curl -O https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/docker-compose.prod.yml
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d
#
# Update ke versi terbaru:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # Devert Monitor Agent
  # Ganti IMAGE_TAG sesuai kebutuhan:
  #   latest     → selalu versi terbaru dari branch main
  #   v1.2.3     → versi spesifik (direkomendasikan untuk production)
  # ─────────────────────────────────────────────────────────────
  monitor-agent:
    image: ghcr.io/lionelyayan/devert-monitoring-agent:${IMAGE_TAG:-latest}
    container_name: devert-monitor-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      # Mount Docker socket (read-only) untuk Docker API access
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devert-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devert_password}
      POSTGRES_DB: ${POSTGRES_DB:-devert_monitor}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Hanya expose ke localhost (jangan expose ke public!)
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devert} -d ${POSTGRES_DB:-devert_monitor}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devert-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  devert-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
