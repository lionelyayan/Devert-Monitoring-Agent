name: Build & Publish Docker Image

# ─────────────────────────────────────────────────────────────
# Workflow ini HANYA berjalan ketika kamu push tag baru
# dengan format: v1.0.0, v1.2.3, v2.0.0-beta, dst.
#
# Cara push tag → lihat: docs/RELEASE.md
# ─────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME di-lowercase karena GHCR hanya menerima huruf kecil
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout source
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 1b. Lowercase image name (wajib untuk GHCR)
      # ──────────────────────────────────────────────
      - name: Lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────
      # 2. Setup Docker Buildx (multi-platform builds)
      # ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ──────────────────────────────────────────────
      # 3. Login ke GitHub Container Registry
      # ──────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # 4. Extract metadata & tags dari git tag
      #
      #    Contoh: push tag v1.2.3 → image tags:
      #      ghcr.io/user/repo:v1.2.3
      #      ghcr.io/user/repo:1.2.3
      #      ghcr.io/user/repo:1.2
      #      ghcr.io/user/repo:1
      #      ghcr.io/user/repo:latest
      # ──────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # ──────────────────────────────────────────────
      # 5. Build & Push (linux/amd64 + linux/arm64)
      # ──────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}

      # ──────────────────────────────────────────────
      # 6. Tampilkan ringkasan di GitHub Actions UI
      # ──────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Update di Server" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
