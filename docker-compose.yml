version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # Devert Monitor Agent
  # ─────────────────────────────────────────────────────────────
  monitor-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devert-monitor-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      # Mount Docker socket for Docker API access
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devert-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devert_password}
      POSTGRES_DB: ${POSTGRES_DB:-devert_monitor}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devert} -d ${POSTGRES_DB:-devert_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devert-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  devert-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
